services:
  # Database PostgreSQL
  postgres:
    image: postgres:16
    container_name: e-traders-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=etraders
      - POSTGRES_USER=etraders_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-etraders_password_2024}
      - POSTGRES_MAX_CONNECTIONS=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - e-traders-network
    ports:
      - "5433:5432"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etraders_user -d etraders"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: e-traders-redis
    restart: unless-stopped
    networks:
      - e-traders-network
    ports:
      - "6379:6379"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Next.js Frontend
  nextjs:
    image: node:18-alpine
    container_name: e-traders-frontend
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    networks:
      - e-traders-network

networks:
  e-traders-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: